name: ci

on:
  push:
    branches: [main]
  pull_request:
  # manual re-run: lets a maintainer re-prove a green on demand (and makes it
  # observable whether Actions is wired at all on this repo, without waiting for a push).
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      # Windows defaults stdio to cp1252; force UTF-8 so subprocess-captured output
      # (e.g. pytester.runpytest_subprocess) decodes consistently across the matrix.
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        # include the otel extra so the write-only OTLP conformance test runs (it importorskips
        # otel, so a dev-only install would silently skip the shipped driver's only coverage).
        run: python -m pip install -e ".[dev,otel]"
      - name: Lint
        run: ruff check src/ tests/ examples/
      - name: Test
        run: pytest -q
      - name: Agent-trajectory and verdict-export demos
        # These are public adoption artifacts, not session-only receipts. Keep the
        # exact README commands runnable on every supported Python/OS combination.
        run: >-
          pytest -q
          examples/test_agent_trajectory.py
          examples/integrations/test_otel_verdict_export.py
      - name: Locked trajectory receipt (GREEN / injected RED / restored GREEN)
        run: python scripts/verify_agent_trajectory_receipt.py
      - name: Test under xdist (ship-once invariant)
        run: pytest -q -n 2
      - name: Backend matrix current (belt-and-braces for filtered pytest runs)
        run: python scripts/gen_backend_matrix.py --check

  deepeval-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install real DeepEval surface
        # Pin the API we actually verified; this is an integration canary, not a
        # hard runtime dependency of ooptdd.
        run: python -m pip install -e ".[dev]" "deepeval==4.0.7"
      - name: DeepEval custom-metric loop (real package, no LLM/API key)
        run: pytest -q examples/integrations/test_deepeval_arrival.py

  # The founding-incident trio + the live parity wing against a REAL OpenObserve —
  # keeps the strongest demos from decaying into "demonstrated once and framed".
  openobserve-demos:
    runs-on: ubuntu-latest
    env:
      OOPTDD_OO_URL: http://localhost:5080
      OOPTDD_OO_USER: root@example.com
      OOPTDD_OO_PASSWORD: "Complexpass#123"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Start OpenObserve
        # fail-closed health wait: a store that never comes up must FAIL this job loudly,
        # not slip through to a confusing downstream assert. (A library whose thesis is
        # "no silent pass" cannot ship a CI step that swallows a dead dependency.)
        run: |
          set -euo pipefail
          docker compose -f examples/openobserve_demo/docker-compose.yml up -d
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5080/healthz; then
              echo "OpenObserve healthy after ${i} tries"; exit 0
            fi
            sleep 2
          done
          echo "::error::OpenObserve never became healthy on :5080"; exit 1
      - name: Demo trio (present / absent / inconclusive)
        run: |
          python examples/openobserve_demo/demo_green.py
          python examples/openobserve_demo/demo_silent_401.py
          python examples/openobserve_demo/demo_inconclusive.py
      - name: Live contract↔mock parity wing
        run: pytest tests/test_contract_mock_parity_receipt.py -v
